:root { --bg:#EEEDE7; --surface:#FBFAF6; --surface2:#F3F1EA; --text:#23211C; --muted:#8B887E; --line:#E1DED4; --accent:#3B4CC0; --shadow:0 1px 2px rgba(40,36,28,0.06); --serif:'Fraunces',Georgia,serif; --sans:'Inter',system-ui,sans-serif; }
* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
html, body { margin: 0; background: var(--bg); }
button { font-family: inherit; cursor: pointer; }
.ghost { background: none; border: none; color: var(--muted); padding: 6px; border-radius: 8px; display: inline-flex; align-items: center; gap: 4px; font-size: 13px; }

.primary:disabled { opacity: 0.55; }
.danger { background: none; border: 1px solid var(--line); color: #C75146; border-radius: 10px; padding: 10px 14px; font-size: 14px; font-weight: 500; }
.taskTitle { font-size: 15px; line-height: 1.4; cursor: text; word-break: break-word; color: var(--text); }
.taskTitle.struck { color: var(--muted); text-decoration: line-through; text-decoration-color: var(--muted); }
.dragHandle { touch-action: pan-y; }
.snapRow::-webkit-scrollbar, .bubbleBar::-webkit-scrollbar { height: 6px; }
.snapRow::-webkit-scrollbar-thumb, .bubbleBar::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }
